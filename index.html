<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Carte "J'y Serai !" - Édition 2027</title>
    
    <!-- CSS de Cropper.js pour l'outil de rognage -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #aa771c 100%);
            --dark-bg: #0d0d0d;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: row;
            max-width: 1100px;
            width: 90%;
            background: #141414;
            border: 1px solid #2a2210;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Section Formulaire */
        .form-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
            outline: none;
        }

        .photo-buttons {
            display: flex;
            gap: 10px;
        }

        .file-label, .camera-btn {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #ffffff;
        }

        .file-label:hover, .camera-btn:hover {
            border-color: #d4af37;
            background: #221a0a;
        }

        input[type="file"] {
            display: none;
        }

        button.main-btn {
            margin-top: 25px;
            padding: 15px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.main-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Zone vidéo caméra */
        .camera-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2a2210;
        }

        video {
            width: 100%;
            border-radius: 6px;
            transform: scaleX(-1);
        }

        /* Modale pour le Rognage Manuel (Crop) */
        .crop-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .crop-wrapper {
            max-width: 500px;
            width: 100%;
            max-height: 70vh;
            background: #141414;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .crop-wrapper img {
            max-width: 100%;
            display: block;
        }

        .crop-actions {
            display: flex;
            gap: 15px;
        }

        .crop-btn {
            padding: 12px 24px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .crop-cancel { background: #333; color: white; }
        .crop-confirm { background: #d4af37; color: black; }

        /* Section Prévisualisation */
        .preview-section {
            flex: 1;
            background: #090909;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #2a2210;
        }

        canvas {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .preview-section { border-left: none; border-top: 1px solid #2a2210; }
        }
    </style>
    <!-- Librairie Cropper.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body>

<div class="container">
    <!-- Formulaire -->
    <div class="form-section">
        <h1>Générateur de Carte<br>Édition 2027</h1>

        <div class="input-group">
            <label for="lastName">NOM (En MAJUSCULES)</label>
            <input type="text" id="lastName" placeholder="Ex: SODOKIN" oninput="updateFormState()">
        </div>

        <div class="input-group">
            <label for="firstName">PRÉNOM</label>
            <input type="text" id="firstName" placeholder="Ex: Léoboui" oninput="updateFormState()">
        </div>

        <div class="input-group">
            <label>VOTRE PHOTO</label>
            <div class="photo-buttons">
                <label for="photoInput" class="file-label" id="fileLabel">📸 Fichier</label>
                <div class="camera-btn" onclick="toggleCamera()">📷 Prendre un selfie</div>
            </div>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
            
            <!-- Zone caméra native -->
            <div id="cameraContainer" class="camera-container">
                <video id="video" autoplay playsinline></video>
                <button type="button" onclick="captureSnapshot()" style="padding:10px; background:#d4af37; border:none; font-weight:bold; border-radius:4px; cursor:pointer;">📸 Capturer</button>
            </div>

            <div id="photoError" class="error-message"></div>
        </div>

        <button id="downloadBtn" class="main-btn" onclick="downloadCard()" disabled>⬇️ Télécharger ma carte</button>
    </div>

    <!-- Aperçu -->
    <div class="preview-section">
        <canvas id="cardCanvas" width="1086" height="1448"></canvas>
        <div class="status">[ Prévisualisation en temps réel ]</div>
    </div>
</div>

<!-- MODALE DE ROGNAGE (CROP) -->
<div id="cropModal" class="crop-modal">
    <div class="crop-wrapper">
        <img id="imageToCrop" src="" alt="A découper">
    </div>
    <div class="crop-actions">
        <button class="crop-btn crop-cancel" onclick="closeCropModal()">Annuler</button>
        <button class="crop-btn crop-confirm" onclick="applyCrop()">Découper & Valider</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    
    const bgImage = new Image();
    bgImage.src = 'background.jpg'; 
    
    let userPhoto = null;
    let streamRef = null;
    let cropperInstance = null;

    bgImage.onload = () => { drawCard(); };

    function updateFormState() {
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const downloadBtn = document.getElementById('downloadBtn');

        if (lastName !== "" && firstName !== "" && userPhoto !== null) {
            downloadBtn.disabled = false;
        } else {
            downloadBtn.disabled = true;
        }
        drawCard();
    }

    async function toggleCamera() {
        const container = document.getElementById('cameraContainer');
        const video = document.getElementById('video');
        
        if (container.style.display === 'flex') {
            stopCamera();
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            streamRef = stream;
            video.srcObject = stream;
            container.style.display = 'flex';
        } catch (err) {
            alert("Impossible d'accéder à l'appareil photo. Vérifiez les permissions.");
        }
    }

    function stopCamera() {
        if (streamRef) {
            streamRef.getTracks().forEach(track => track.stop());
            streamRef = null;
        }
        document.getElementById('cameraContainer').style.display = 'none';
    }

    function captureSnapshot() {
        const video = document.getElementById('video');
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tempCtx = tempCanvas.getContext('2d');
        
        tempCtx.translate(tempCanvas.width, 0);
        tempCtx.scale(-1, 1);
        tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        
        stopCamera();

        const dataUrl = tempCanvas.toDataURL('image/jpeg');
        openCropModal(dataUrl);
    }

    function handlePhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) { openCropModal(e.target.result); }
        reader.readAsDataURL(file);
    }

    function openCropModal(imageSrc) {
        const modal = document.getElementById('cropModal');
        const img = document.getElementById('imageToCrop');
        
        img.src = imageSrc;
        modal.style.display = 'flex';

        if (cropperInstance) {
            cropperInstance.destroy();
        }

        // Configuration du ratio précis : la photo remplit TOUT le cadre doré (rectangulaire)
        cropperInstance = new Cropper(img, {
            aspectRatio: 489 / 695, 
            viewMode: 1,
            dragMode: 'move',
            background: false,
            autoCropArea: 0.9,
            cropBoxMovable: true,
            cropBoxResizable: true,
        });
    }

    function closeCropModal() {
        document.getElementById('cropModal').style.display = 'none';
        document.getElementById('photoInput').value = ""; 
    }

    function applyCrop() {
        if (!cropperInstance) return;

        const croppedCanvas = cropperInstance.getCroppedCanvas({
            width: 489,
            height: 695
        });

        const croppedDataUrl = croppedCanvas.toDataURL('image/jpeg');
        closeCropModal();
        processFinalPhoto(croppedDataUrl);
    }

    function processFinalPhoto(url) {
        const errorDiv = document.getElementById('photoError');
        const fileLabel = document.getElementById('fileLabel');

        errorDiv.style.display = 'none';
        errorDiv.innerText = '';

        const tempImg = new Image();
        tempImg.onload = function() {
            userPhoto = tempImg;
            fileLabel.innerText = "✅ Image OK";
            updateFormState();
        }
        tempImg.src = url;
    }

    function fitText(text, defaultFontSize, fontFamily, maxWidth) {
        ctx.font = `bold ${defaultFontSize}px ${fontFamily}`;
        let width = ctx.measureText(text).width;
        let currentSize = defaultFontSize;
        while (width > maxWidth && currentSize > 22) {
            currentSize -= 2;
            ctx.font = `bold ${currentSize}px ${fontFamily}`;
            width = ctx.measureText(text).width;
        }
        return ctx.font;
    }

    function drawCard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. Dessiner le fond de l'affiche
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // NOUVELLES COORDONNÉES : la photo remplit TOUT le cadre doré (rectangulaire)
        const rectX = 143;
        const rectY = 428;
        const rectWidth = 489;
        const rectHeight = 695;   // hauteur totale du cadre doré
        const frameBottom = rectY + rectHeight; // 1123

        // 2. Intégration propre de la photo (remplit tout le cadre, sans déformation)
        if (!userPhoto) {
            ctx.save();
            ctx.fillStyle = "#d4af37";
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.font = '28px Segoe UI';
            ctx.fillText("[ Votre Photo ]", rectX + (rectWidth / 2), rectY + (rectHeight / 2));
            ctx.restore();
        } else {
            ctx.save();
            ctx.drawImage(userPhoto, rectX, rectY, rectWidth, rectHeight);
            ctx.restore();
        }

        // 3. Dessin des Textes (Nom / Prénom) JUSTE EN DESSOUS du cadre doré
        const lastName = document.getElementById('lastName').value.trim() || "VOTRE NOM";
        const firstName = document.getElementById('firstName').value.trim() || "Votre Prénom";

        const textCenterX = rectX + (rectWidth / 2);

        ctx.save();
        ctx.textAlign = 'center';

        // Affichage du NOM (dans l'espace libre sous le cadre, avant le ruban "Membre et soutien")
        ctx.fillStyle = '#ffffff';
        ctx.font = fitText(lastName.toUpperCase(), 42, 'Segoe UI', rectWidth - 10);
        ctx.fillText(lastName.toUpperCase(), textCenterX, frameBottom + 72);

        // Affichage du PRÉNOM (juste en dessous du nom)
        ctx.fillStyle = '#d4af37';
        ctx.font = fitText(firstName, 30, 'Georgia', rectWidth - 10);
        ctx.fillText(firstName, textCenterX, frameBottom + 112);

        ctx.restore();
    }

    function downloadCard() {
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();

        if (!lastName || !firstName || !userPhoto) {
            alert("Veuillez remplir tous les champs !");
            return;
        }

        const link = document.createElement('a');
        link.download = `carte-presence-${lastName.toLowerCase()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    }
</script>
</body>
</html>
