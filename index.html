<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Carte "J'y Serai !" - Édition 2027</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #aa771c 100%);
            --dark-bg: #0d0d0d;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: row;
            max-width: 1100px;
            width: 90%;
            background: #141414;
            border: 1px solid #2a2210;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Section Formulaire */
        .form-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
            outline: none;
        }

        .photo-buttons {
            display: flex;
            gap: 10px;
        }

        .file-label, .camera-btn {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #ffffff;
        }

        .file-label:hover, .camera-btn:hover {
            border-color: #d4af37;
            background: #221a0a;
        }

        input[type="file"] {
            display: none;
        }

        /* Curseur de zoom manuel */
        .zoom-container {
            margin-top: 15px;
            display: none;
        }

        .zoom-slider {
            width: 100%;
            accent-color: #d4af37;
        }

        button.main-btn {
            margin-top: 25px;
            padding: 15px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.main-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Zone vidéo pour la caméra en direct */
        .camera-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2a2210;
        }

        video {
            width: 100%;
            border-radius: 6px;
            transform: scaleX(-1); /* Effet miroir naturel pour un selfie */
        }

        /* Section Prévisualisation */
        .preview-section {
            flex: 1;
            background: #090909;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #2a2210;
        }

        canvas {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .preview-section { border-left: none; border-top: 1px solid #2a2210; }
        }
    </style>
    <!-- Librairie de détection de visage -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>

<div class="container">
    <!-- Formulaire -->
    <div class="form-section">
        <h1>Générateur de Carte<br>Édition 2027</h1>
        
        <div class="input-group">
            <label for="lastName">NOM (En MAJUSCULES)</label>
            <input type="text" id="lastName" placeholder="Ex: SODOKIN" oninput="updateFormState()">
        </div>

        <div class="input-group">
            <label for="firstName">PRÉNOM</label>
            <input type="text" id="firstName" placeholder="Ex: Léoboui Faris" oninput="updateFormState()">
        </div>

        <div class="input-group">
            <label>VOTRE PHOTO</label>
            <div class="photo-buttons">
                <label for="photoInput" class="file-label" id="fileLabel">📸 Fichier</label>
                <div class="camera-btn" onclick="toggleCamera()">📷 Prendre un selfie</div>
            </div>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
            
            <!-- Zone caméra native -->
            <div id="cameraContainer" class="camera-container">
                <video id="video" autoplay playsinline></video>
                <button type="button" onclick="captureSnapshot()" style="padding:10px; background:#d4af37; border:none; font-weight:bold; border-radius:4px; cursor:pointer;">📸 Capturer</button>
            </div>

            <div id="photoError" class="error-message"></div>

            <!-- Suggestion 1 : Curseur d'ajustement du zoom manuel -->
            <div class="zoom-container" id="zoomContainer">
                <label for="zoomSlider">🔍 Ajuster le zoom de la photo :</label>
                <input type="range" id="zoomSlider" class="zoom-slider" min="1" max="2.5" step="0.05" value="1" oninput="drawCard()">
            </div>
        </div>

        <button id="downloadBtn" class="main-btn" onclick="downloadCard()" disabled>⬇️ Télécharger ma carte</button>
    </div>

    <!-- Aperçu -->
    <div class="preview-section">
        <canvas id="cardCanvas" width="1200" height="1600"></canvas>
        <div class="status">[ Prévisualisation en temps réel ]</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    
    const bgImage = new Image();
    bgImage.src = 'background.jpg'; 
    
    let userPhoto = null;
    let facePosition = null;
    let modelsReady = false;
    let streamRef = null;

    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
        .then(() => {
            modelsReady = true;
            console.log("Modèle de détection de visage chargé.");
        })
        .catch((err) => {
            console.warn("Impossible de charger le modèle de détection de visage.", err);
        });

    bgImage.onload = () => { drawCard(); };

    function updateFormState() {
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const downloadBtn = document.getElementById('downloadBtn');

        if (lastName !== "" && firstName !== "" && userPhoto !== null) {
            downloadBtn.disabled = false;
        } else {
            downloadBtn.disabled = true;
        }
        drawCard();
    }

    // Suggestion 3 : Activer / Désactiver le flux caméra en direct
    async function toggleCamera() {
        const container = document.getElementById('cameraContainer');
        const video = document.getElementById('video');
        
        if (container.style.display === 'flex') {
            stopCamera();
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            streamRef = stream;
            video.srcObject = stream;
            container.style.display = 'flex';
        } catch (err) {
            alert("Impossible d'accéder à l'appareil photo. Vérifiez les permissions.");
        }
    }

    function stopCamera() {
        if (streamRef) {
            streamRef.getTracks().forEach(track => track.stop());
            streamRef = null;
        }
        document.getElementById('cameraContainer').style.display = 'none';
    }

    // Capturer la photo à partir du flux vidéo
    function captureSnapshot() {
        const video = document.getElementById('video');
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tempCtx = tempCanvas.getContext('2d');
        
        // Effet miroir inversé pour remettre la photo à l'endroit lors de la capture
        tempCtx.translate(tempCanvas.width, 0);
        tempCtx.scale(-1, 1);
        tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        
        stopCamera();

        const dataUrl = tempCanvas.toDataURL('image/jpeg');
        processPhotoUrl(dataUrl);
    }

    function handlePhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) { processPhotoUrl(e.target.result); }
        reader.readAsDataURL(file);
    }

    async function processPhotoUrl(url) {
        const errorDiv = document.getElementById('photoError');
        const fileLabel = document.getElementById('fileLabel');
        const zoomContainer = document.getElementById('zoomContainer');
        
        errorDiv.style.display = 'none';
        errorDiv.innerText = '';
        userPhoto = null;
        facePosition = null;
        zoomContainer.style.display = 'none';
        document.getElementById('zoomSlider').value = 1;
        updateFormState();

        fileLabel.innerText = "⏳ Analyse...";

        const tempImg = new Image();
        tempImg.onload = async function() {
            const checkResult = await analyzePhoto(tempImg);
            
            if (checkResult.valid) {
                userPhoto = tempImg;
                facePosition = checkResult.position;
                fileLabel.innerText = "✅ Image OK";
                zoomContainer.style.display = 'block'; // Activer le curseur de zoom si valide
            } else {
                errorDiv.innerText = checkResult.message;
                errorDiv.style.display = 'block';
                fileLabel.innerText = "❌ Refusée";
                document.getElementById('photoInput').value = ""; 
            }
            updateFormState();
        }
        tempImg.src = url;
    }

    async function analyzePhoto(image) {
        if (!modelsReady) {
            return { valid: false, message: "Le module d'analyse se charge. Réessayez dans un instant." };
        }

        try {
            const detections = await faceapi.detectAllFaces(
                image,
                new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })
            );

            if (detections.length === 0) {
                return { valid: false, message: "Aucun visage détecté. Photo floue, obstruée ou mal éclairée." };
            }

            if (detections.length > 1) {
                return { valid: false, message: "Plusieurs visages détectés. Seule une personne est autorisée." };
            }

            const detection = detections[0];
            if (detection.score < 0.6) {
                return { valid: false, message: "Netteté insuffisante ou visage partiellement masqué." };
            }

            const box = detection.box;
            return {
                valid: true,
                position: { xPct: (box.x + box.width / 2) / image.width, yPct: (box.y + box.height / 2) / image.height }
            };
        } catch (err) {
            return { valid: false, message: "Erreur lors du traitement de l'image." };
        }
    }

    function fitText(text, defaultFontSize, fontFamily, maxWidth) {
        ctx.font = `${defaultFontSize}px ${fontFamily}`;
        let width = ctx.measureText(text).width;
        let currentSize = defaultFontSize;
        while (width > maxWidth && currentSize > 25) {
            currentSize -= 2;
            ctx.font = `bold ${currentSize}px ${fontFamily}`;
            width = ctx.measureText(text).width;
        }
        return ctx.font;
    }

    function drawCard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        const centerX = 416; 
        const centerY = 776; 
        const radius = 367;  

        ctx.fillStyle = "#070707";
        ctx.fillRect(90, 1145, 650, 190); 

        if (!userPhoto) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = "#111111";
            ctx.fill();
            ctx.fillStyle = "#d4af37";
            ctx.textAlign = 'center';
            ctx.font = '30px Segoe UI';
            ctx.fillText("[ Votre Photo Ici ]", centerX, centerY);
            ctx.restore();
        }

        if (userPhoto) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.clip();

            // Gestion dynamique du Zoom Manuel basé sur le curseur (Suggestion 1)
            const manualZoom = parseFloat(document.getElementById('zoomSlider').value);

            const diameter = radius * 2;
            const baseScale = Math.max(diameter / userPhoto.width, diameter / userPhoto.height);
            const scale = baseScale * manualZoom;

            const drawWidth = userPhoto.width * scale;
            const drawHeight = userPhoto.height * scale;

            let drawX = centerX - (drawWidth / 2);
            let drawY = centerY - (drawHeight / 2);

            if (facePosition) {
                const faceX = facePosition.xPct * drawWidth;
                const faceY = facePosition.yPct * drawHeight;
                drawX = centerX - faceX;
                drawY = centerY - faceY;

                // Empêcher l'image de sortir des limites du cercle
                const minDrawX = centerX + radius - drawWidth;
                const maxDrawX = centerX - radius;
                const minDrawY = centerY + radius - drawHeight;
                const maxDrawY = centerY - radius;

                drawX = Math.min(Math.max(drawX, minDrawX), maxDrawX);
                drawY = Math.min(Math.max(drawY, minDrawY), maxDrawY);
            }

            ctx.drawImage(userPhoto, drawX, drawY, drawWidth, drawHeight);
            ctx.restore();

            // Anneau doré protecteur autour de la photo
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = '#d4af37'; 
            ctx.lineWidth = 8;
            ctx.stroke();
            ctx.restore();
        }

        const lastName = document.getElementById('lastName').value || "VOTRE NOM";
        const firstName = document.getElementById('firstName').value || "Votre Prénom";

        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = fitText(lastName.toUpperCase(), 70, 'Segoe UI', 630);
        ctx.fillText(lastName.toUpperCase(), 416, 1220); 

        ctx.fillStyle = '#d4af37';
        ctx.font = fitText(firstName, 55, 'Georgia', 630);
        ctx.fillText(firstName, 416, 1300); 
    }

    function downloadCard() {
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();

        if (!lastName || !firstName || !userPhoto) {
            alert("Veuillez remplir tous les champs et ajouter votre photo !");
            return;
        }

        const link = document.createElement('a');
        link.download = `carte-presence-2027-${lastName.toLowerCase()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    }
</script>
</body>
</html>
