<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Carte "J'y Serai !" - Édition 2027</title>
    <!-- Styles de Croppr.js -->
    <link href="https://cdn.jsdelivr.net/gh/jamessouth/Croppr.js@v2.3.0/dist/croppr.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #aa771c 100%);
            --dark-bg: #0d0d0d;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: row;
            max-width: 1100px;
            width: 90%;
            background: #141414;
            border: 1px solid #2a2210;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Section Formulaire */
        .form-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
            outline: none;
        }

        .photo-buttons {
            display: flex;
            gap: 10px;
        }

        .file-label, .camera-btn {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #ffffff;
        }

        .file-label:hover, .camera-btn:hover {
            border-color: #d4af37;
            background: #221a0a;
        }

        input[type="file"] {
            display: none;
        }

        /* Zone de Crop Manuel */
        .crop-container {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .crop-wrapper {
            max-width: 100%;
            max-height: 300px;
            overflow: hidden;
        }

        .crop-wrapper img {
            max-width: 100%;
        }

        /* Zone vidéo pour la caméra en direct */
        .camera-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2a2210;
        }

        video {
            width: 100%;
            border-radius: 6px;
            transform: scaleX(-1);
        }

        button.main-btn {
            margin-top: 25px;
            padding: 15px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.main-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        button.action-btn {
            margin-top: 10px;
            padding: 10px;
            background: #d4af37;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Section Prévisualisation */
        .preview-section {
            flex: 1;
            background: #090909;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #2a2210;
        }

        canvas {
            max-width: 100%;
            max-height: 550px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .preview-section { border-left: none; border-top: 1px solid #2a2210; }
        }
    </style>
    <!-- Librairies pour le Crop et face-api.js -->
    <script src="https://cdn.jsdelivr.net/gh/jamessouth/Croppr.js@v2.3.0/dist/croppr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h1>Générateur de Carte<br>Édition 2027</h1>
        
        <div class="input-group">
            <label for="lastName">NOM (En MAJUSCULES)</label>
            <input type="text" id="lastName" placeholder="Ex: SOKANDAN" oninput="updateFormState()">
        </div>

        <div class="input-group">
            <label for="firstName">PRÉNOM</label>
            <input type="text" id="firstName" placeholder="Ex: Clément Martin" oninput="updateFormState()">
        </div>

        <div class="input-group">
            <label>VOTRE PHOTO</label>
            <div class="photo-buttons">
                <label for="photoInput" class="file-label" id="fileLabel">📸 Fichier</label>
                <div class="camera-btn" onclick="toggleCamera()">📷 Prendre un selfie</div>
            </div>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
            
            <!-- Zone caméra -->
            <div id="cameraContainer" class="camera-container">
                <video id="video" autoplay playsinline></video>
                <button type="button" onclick="captureSnapshot()" class="action-btn">📸 Capturer</button>
            </div>

            <!-- Zone de Recadrage Manuel -->
            <div id="cropContainer" class="crop-container">
                <label>✂️ Ajustez le cadrage (Carré/Cercle) :</label>
                <div class="crop-wrapper">
                    <img id="cropImage" src="" alt="A recadrer">
                </div>
                <button type="button" onclick="validateAndAnalyzeCrop()" class="action-btn">🔍 Valider le cadrage & Analyser par l'IA</button>
            </div>

            <div id="photoError" class="error-message"></div>
        </div>

        <button id="downloadBtn" class="main-btn" onclick="downloadCard()" disabled>⬇️ Télécharger ma carte</button>
    </div>

    <div class="preview-section">
        <canvas id="cardCanvas" width="1200" height="1600"></canvas>
        <div class="status">[ Prévisualisation en temps réel ]</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    
    const bgImage = new Image();
    bgImage.src = 'background.png'; 
    
    let userPhoto = null;
    let modelsReady = false;
    let streamRef = null;
    let cropprInstance = null;
    let rawImageSrc = null;

    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
        .then(() => { modelsReady = true; console.log("Modèle IA chargé."); })
        .catch(err => console.warn("Erreur chargement modèle IA.", err));

    bgImage.onload = () => { drawCard(); };

    function updateFormState() {
        const lastName = document.getElementById('lastName').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const downloadBtn = document.getElementById('downloadBtn');

        downloadBtn.disabled = !(lastName !== "" && firstName !== "" && userPhoto !== null);
        drawCard();
    }

    async function toggleCamera() {
        const container = document.getElementById('cameraContainer');
        const video = document.getElementById('video');
        if (container.style.display === 'flex') { stopCamera(); return; }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            streamRef = stream;
            video.srcObject = stream;
            container.style.display = 'flex';
            document.getElementById('cropContainer').style.display = 'none';
        } catch (err) {
            alert("Impossible d'accéder à l'appareil photo.");
        }
    }

    function stopCamera() {
        if (streamRef) { streamRef.getTracks().forEach(track => track.stop()); streamRef = null; }
        document.getElementById('cameraContainer').style.display = 'none';
    }

    function captureSnapshot() {
        const video = document.getElementById('video');
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;
        const tempCtx = tempCanvas.getContext('2d');
        
        tempCtx.translate(tempCanvas.width, 0);
        tempCtx.scale(-1, 1);
        tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        
        stopCamera();
        initCrop(tempCanvas.toDataURL('image/jpeg'));
    }

    function handlePhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) { initCrop(e.target.result); }
        reader.readAsDataURL(file);
    }

    // Initialisation du Crop Manuel
    function initCrop(src) {
        rawImageSrc = src;
        const cropContainer = document.getElementById('cropContainer');
        const cropImage = document.getElementById('cropImage');
        const errorDiv = document.getElementById('photoError');
        
        errorDiv.style.display = 'none';
        userPhoto = null;
        updateFormState();

        if (cropprInstance) { cropprInstance.destroy(); }
        
        cropImage.src = src;
        cropContainer.style.display = 'flex';

        // Création de l'instance de recadrage au format carré (1:1) pour correspondre au cercle
        cropImage.onload = function() {
            cropprInstance = new Croppr('#cropImage', {
                aspectRatio: 1,
                startSize: [80, 80, '%']
            });
        };
    }

    // Validation du crop par l'utilisateur suivi de la vérification IA
    async function validateAndAnalyzeCrop() {
        if (!cropprInstance) return;

        const errorDiv = document.getElementById('photoError');
        const fileLabel = document.getElementById('fileLabel');
        errorDiv.style.display = 'none';
        fileLabel.innerText = "⏳ Analyse IA...";

        // Extraction de la zone recadrée sur un canvas temporaire
        const data = cropprInstance.getValue();
        const baseImg = new Image();
        baseImg.src = rawImageSrc;

        baseImg.onload = async function() {
            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = data.width;
            cropCanvas.height = data.height;
            const cropCtx = cropCanvas.getContext('2d');

            cropCtx.drawImage(
                baseImg,
                data.x, data.y, data.width, data.height,
                0, 0, data.width, data.height
            );

            // Analyse IA du résultat recadré
            const finalImg = new Image();
            finalImg.onload = async function() {
                const checkResult = await analyzePhoto(finalImg);
                
                if (checkResult.valid) {
                    userPhoto = finalImg;
                    fileLabel.innerText = "✅ Image OK";
                    document.getElementById('cropContainer').style.display = 'none';
                } else {
                    errorDiv.innerText = checkResult.message;
                    errorDiv.style.display = 'block';
                    fileLabel.innerText = "❌ Refusée";
                }
                updateFormState();
            };
            finalImg.src = cropCanvas.toDataURL('image/jpeg');
        };
    }

    async function analyzePhoto(image) {
        if (!modelsReady) {
            return { valid: false, message: "L'IA se charge. Réessayez dans une seconde." };
        }
        try {
            const detections = await faceapi.detectAllFaces(image, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }));
            if (detections.length === 0) return { valid: false, message: "Aucun visage détecté sur la zone recadrée." };
            if (detections.length > 1) return { valid: false, message: "Plusieurs visages détectés." };
            return { valid: true };
        } catch (err) {
            return { valid: false, message: "Erreur lors de l'analyse faciale." };
        }
    }

    function fitText(text, defaultFontSize, fontFamily, maxWidth) {
        ctx.font = `${defaultFontSize}px ${fontFamily}`;
        let width = ctx.measureText(text).width;
        let currentSize = defaultFontSize;
        while (width > maxWidth && currentSize > 22) {
            currentSize -= 2;
            ctx.font = `bold ${currentSize}px ${fontFamily}`;
            width = ctx.measureText(text).width;
        }
        return ctx.font;
    }

    function drawCard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // Coordonnées ajustées pour correspondre au cercle du milieu de l'image
        const centerX = 320; 
        const centerY = 418; 
        const radius = 275;  

        if (!userPhoto) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(17, 17, 17, 0.85)";
            ctx.fill();
            ctx.fillStyle = "#d4af37";
            ctx.textAlign = 'center';
            ctx.font = 'bold 24px Segoe UI';
            ctx.fillText("[ Votre Photo Ici ]", centerX, centerY);
            ctx.restore();
        } else {
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.clip();
            // L'image étant déjà parfaitement cadrée en carré (1:1), on l'ajuste directement aux dimensions du cercle
            ctx.drawImage(userPhoto, centerX - radius, centerY - radius, radius * 2, radius * 2);
            ctx.restore();
        }

        const lastName = document.getElementById('lastName').value.trim() || "VOTRE NOM";
        const firstName = document.getElementById('firstName').value.trim() || "Votre Prénom";

        // Zone de texte située sur le bandeau inférieur doré/sombre
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = fitText(lastName.toUpperCase(), 44, 'Segoe UI', 650);
        ctx.fillText(lastName.toUpperCase(), 395, 1455); 

        ctx.fillStyle = '#f3e5ab';
        ctx.font = fitText(firstName, 36, 'Georgia', 650);
        ctx.fillText(firstName, 395, 1510); 
    }

    function downloadCard() {
        const lastName = document.getElementById('lastName').value.trim();
        if (!lastName || !userPhoto) return;
        const link = document.createElement('a');
        link.download = `carte-presence-2027-${lastName.toLowerCase()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.98);
        link.click();
    }
</script>
</body>
</html>
