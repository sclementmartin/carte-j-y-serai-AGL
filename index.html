<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Carte "J'y Serai !" - Édition 2027 (Corrigé)</title>
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #aa771c 100%);
            --dark-bg: #0d0d0d;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: row;
            max-width: 1100px;
            width: 90%;
            background: #141414;
            border: 1px solid #2a2210;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Section Formulaire */
        .form-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #d4af37;
            outline: none;
        }

        .file-label {
            display: block;
            padding: 12px;
            background: #1a1a1a;
            border: 2px dashed #444;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-label:hover {
            border-color: #d4af37;
            background: #221a0a;
        }

        input[type="file"] {
            display: none;
        }

        button {
            margin-top: 20px;
            padding: 15px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        /* Section Prévisualisation */
        .preview-section {
            flex: 1;
            background: #090909;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #2a2210;
        }

        canvas {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .preview-section { border-left: none; border-top: 1px solid #2a2210; }
        }
    </style>
    <!-- Librairie de détection de visage : elle tourne dans le navigateur, aucune donnée n'est envoyée sur un serveur -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>

<div class="container">
    <!-- Formulaire -->
    <div class="form-section">
        <h1>Générateur de Carte<br>Édition 2027</h1>
        
        <div class="input-group">
            <label for="lastName">NOM (En MAJUSCULES)</label>
            <input type="text" id="lastName" placeholder="Ex: SODOKIN" oninput="drawCard()">
        </div>

        <div class="input-group">
            <label for="firstName">PRÉNOM</label>
            <input type="text" id="firstName" placeholder="Ex: Léoboui Faris" oninput="drawCard()">
        </div>

        <div class="input-group">
            <label>VOTRE PHOTO</label>
            <label for="photoInput" class="file-label" id="fileLabel">📸 Choisir une photo</label>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
        </div>

        <button onclick="downloadCard()">⬇️ Télécharger ma carte</button>
    </div>

    <!-- Aperçu -->
    <div class="preview-section">
        <canvas id="cardCanvas" width="1200" height="1600"></canvas>
        <div class="status">[ Prévisualisation en temps réel ]</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    
    // Charger l'image de fond vierge (sans photo de Clément ni son nom)
    const bgImage = new Image();
    bgImage.src = 'background.jpg'; // Mets ici le nom exact de ton image de fond propre
    
    let userPhoto = null;

    // Position du visage détecté dans la photo (en % de la largeur/hauteur de l'image)
    // null tant qu'aucun visage n'a été détecté -> on utilisera le centrage par défaut
    let facePosition = null;

    // Adresse où sont hébergés les modèles pré-entraînés de face-api.js
    const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
    let modelsReady = false;

    // On charge le modèle "TinyFaceDetector" : léger et rapide, largement suffisant
    // pour repérer un visage sur une photo de type portrait/selfie.
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL)
        .then(() => {
            modelsReady = true;
            console.log("Modèle de détection de visage chargé.");
        })
        .catch((err) => {
            console.warn("Impossible de charger le modèle de détection de visage, on utilisera le centrage par défaut.", err);
        });

    bgImage.onload = () => {
        drawCard();
    };

    async function handlePhoto(event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('fileLabel').innerText = "⏳ Analyse de la photo...";

        const reader = new FileReader();
        reader.onload = function(e) {
            userPhoto = new Image();
            userPhoto.onload = async function() {
                facePosition = await detectFace(userPhoto);
                document.getElementById('fileLabel').innerText = "✅ Photo chargée";
                drawCard();
            }
            userPhoto.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    // Détecte le visage sur l'image fournie et renvoie son centre en pourcentage
    // de la largeur/hauteur de l'image (ex: {xPct: 0.5, yPct: 0.35}).
    // Renvoie null si aucun visage n'est trouvé (ou si le modèle n'est pas prêt).
    async function detectFace(image) {
        if (!modelsReady) return null;

        try {
            const detection = await faceapi.detectSingleFace(
                image,
                new faceapi.TinyFaceDetectorOptions()
            );

            if (!detection) return null;

            const box = detection.box; // {x, y, width, height} en pixels sur l'image originale

            // Centre du visage détecté, converti en pourcentage de l'image
            const faceCenterX = box.x + box.width / 2;
            const faceCenterY = box.y + box.height / 2;

            return {
                xPct: faceCenterX / image.width,
                yPct: faceCenterY / image.height
            };
        } catch (err) {
            console.warn("Erreur pendant la détection de visage :", err);
            return null;
        }
    }

    function drawCard() {
        // 1. Dessiner le fond (image de fond vierge)
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

        // --- ZONE DE SÉCURITÉ ET MASQUAGE AUTOMATIQUE ---
        
        // Coordonnées et rayon du cercle (Zone de la photo)
        // Correction de centerY pour un meilleur centrage dans le cercle doré
        const centerX = 416; 
        const centerY = 776; // Ajustement ici
        const radius = 367;  

        // A. On masque l'ancienne zone du nom (Clément Martin) avec un rectangle noir
        ctx.fillStyle = "#070707";
        ctx.fillRect(90, 1145, 650, 190); 

        // B. Si l'utilisateur n'a pas encore chargé sa photo, on met un fond sombre neutre
        if (!userPhoto) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fillStyle = "#111111";
            ctx.fill();
            
            // Petit texte d'indication dans le rond
            ctx.fillStyle = "#d4af37";
            ctx.textAlign = 'center';
            ctx.font = '30px Segoe UI';
            ctx.fillText("[ Votre Photo Ici ]", centerX, centerY);
            ctx.restore();
        }

        // 2. Dessiner la photo de l'utilisateur (si elle est chargée)
        if (userPhoto) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            // On agrandit la photo pour qu'elle recouvre entièrement le cercle
            // (comme un "cover" en CSS), sans jamais la déformer.
            const diameter = radius * 2;
            const scale = Math.max(diameter / userPhoto.width, diameter / userPhoto.height);
            const drawWidth = userPhoto.width * scale;
            const drawHeight = userPhoto.height * scale;

            // Position par défaut : centrage géométrique pur (comme avant)
            let drawX = centerX - (drawWidth / 2);
            let drawY = centerY - (drawHeight / 2);

            // Si un visage a été détecté, on décale l'image pour que le visage
            // tombe pile au centre du cercle, au lieu du milieu géométrique de la photo.
            if (facePosition) {
                const faceX = facePosition.xPct * drawWidth;
                const faceY = facePosition.yPct * drawHeight;
                drawX = centerX - faceX;
                drawY = centerY - faceY;

                // On empêche l'image de trop bouger et de laisser apparaître
                // du vide (fond noir) sur les bords du cercle.
                const minDrawX = centerX + radius - drawWidth;
                const maxDrawX = centerX - radius;
                const minDrawY = centerY + radius - drawHeight;
                const maxDrawY = centerY - radius;

                drawX = Math.min(Math.max(drawX, minDrawX), maxDrawX);
                drawY = Math.min(Math.max(drawY, minDrawY), maxDrawY);
            }

            ctx.drawImage(userPhoto, drawX, drawY, drawWidth, drawHeight);
            ctx.restore();
        }

        // 3. Ajouter les nouveaux textes saisis par l'utilisateur
        const lastName = document.getElementById('lastName').value || "VOTRE NOM";
        const firstName = document.getElementById('firstName').value || "Votre Prénom";

        // Style pour le NOM (Grand et doré/blanc)
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 70px Segoe UI';
        ctx.fillText(lastName.toUpperCase(), 416, 1220); // Position Y ajustée

        // Style pour le PRÉNOM (Style manuscrit ou plus fin)
        ctx.fillStyle = '#d4af37';
        ctx.font = 'italic 55px Georgia';
        ctx.fillText(firstName, 416, 1300); // Position Y ajustée
    }

    // Fonction de téléchargement
    function downloadCard() {
        const link = document.createElement('a');
        link.download = 'ma-carte-presence-2027.jpg';
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();
    }
</script>
</body>
</html>
